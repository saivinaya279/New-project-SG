<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocioServe Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.navbar{
background:#3000cc;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar h2{
color:white;
}

.logout{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.heading{
margin-bottom:25px;
color:#003366;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.count{
font-size:35px;
font-weight:bold;
color:#003366;
}

.actions{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:30px;
}

.actions h2{
margin-bottom:15px;
color:#003366;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#3000cc;
color:white;
cursor:pointer;
font-size:15px;
}

.btn:hover{
opacity:.9;
}

.activity{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.activity h2{
margin-bottom:15px;
color:#003366;
}

ul{
list-style:none;
}

li{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="navbar">
<h2>SocioServe Admin Portal</h2>
<a href="login.html" class="logout">Logout</a>
</div>

<div class="container">

<h1 class="heading">System Overview</h1>

<div class="cards">

<div class="card">
<h3>Total Issues</h3>
<div class="count" id="totalIssues">0</div>
</div>

<div class="card">
<h3>Service Requests</h3>
<div class="count" id="serviceRequests">0</div>
</div>

<div class="card">
<h3>Waste Requests</h3>
<div class="count" id="wasteRequests">0</div>
</div>

<div class="card">
<h3>Pending Verification</h3>
<div class="count" id="pendingUsers">0</div>
</div>

</div>

<div class="actions">

<h2>Quick Actions</h2>

<button class="btn"
onclick="location.href='verify_users.html'">
Verify Service Providers
</button>

<button class="btn"
onclick="location.href='all_reports.html'">
View All Issues
</button>

<button class="btn"
onclick="location.href='view_service_requests.html'">
View Service Requests
</button>

<button class="btn"
onclick="location.href='view_waste_requests.html'">
View Waste Requests
</button>

</div>

<div class="activity">

<h2>Recent Registrations</h2>

<ul id="recentUsers">
<li>No users yet</li>
</ul>

</div>

</div>

<script>

const users =
JSON.parse(localStorage.getItem("registeredUsers")) || [];

const issues =
JSON.parse(localStorage.getItem("reportedIssues")) || [];

const serviceRequests =
JSON.parse(localStorage.getItem("serviceRequests")) || [];

const wasteRequests =
JSON.parse(localStorage.getItem("wasteRequests")) || [];

document.getElementById("totalIssues").textContent =
issues.length;

document.getElementById("serviceRequests").textContent =
serviceRequests.length;

document.getElementById("wasteRequests").textContent =
wasteRequests.length;

document.getElementById("pendingUsers").textContent =
users.filter(
u =>
u.userType==="Service Provider" &&
!u.isVerified
).length;

const recentUsers =
document.getElementById("recentUsers");

if(users.length){

recentUsers.innerHTML =
users.slice(-5).reverse().map(user =>

`<li>
${user.fullName}
(${user.userType})
</li>`

).join("");

}

</script>

</body>
</html>
