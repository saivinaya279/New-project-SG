<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocioServe - Login / Sign Up</title>

<style>
:root{
  --primary:#7969b8;
  --secondary:#003366;
  --bg:#f4f4f4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.auth-container{
  width:90%;
  max-width:450px;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.auth-header{
  text-align:center;
  margin-bottom:25px;
}

.auth-header h2{
  color:var(--primary);
  margin-bottom:5px;
}

.auth-header h3{
  color:var(--secondary);
  font-size:18px;
}

.tab-switcher{
  display:flex;
  margin-bottom:20px;
  border:1px solid var(--primary);
  border-radius:6px;
  overflow:hidden;
}

.tab-switcher button{
  flex:1;
  border:none;
  padding:12px;
  cursor:pointer;
  background:white;
  color:var(--primary);
  font-weight:bold;
}

.tab-switcher button.active{
  background:var(--primary);
  color:white;
}

.form-content form{
  display:none;
}

.form-content form.active{
  display:block;
}

.input-group{
  margin-bottom:15px;
}

.input-group label{
  display:block;
  margin-bottom:5px;
  font-weight:bold;
}

.input-group input,
.input-group select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
}

.btn-primary{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.btn-primary:hover{
  background:#6755a9;
}

#statusMessage{
  display:none;
  margin-bottom:15px;
  padding:10px;
  border-radius:6px;
  text-align:center;
  font-weight:bold;
}

.success{
  background:#d4edda;
  color:#155724;
}

.error{
  background:#f8d7da;
  color:#721c24;
}
</style>

</head>
<body>

<div class="auth-container">

  <div class="auth-header">
    <h2>SOCIOSERVE</h2>
    <h3>Community Platform Login</h3>
  </div>

  <div class="tab-switcher">
    <button id="loginTab" class="active">Log In</button>
    <button id="signupTab">Sign Up</button>
  </div>

  <div id="statusMessage"></div>

  <div class="form-content">

    <!-- LOGIN FORM -->

    <form id="loginForm" class="active">

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" required>
      </div>

      <div class="input-group">
        <label>Login As</label>
        <select id="loginUserType">
          <option value="Citizen">Citizen</option>
          <option value="Service Provider">Service Provider</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
      </div>

      <button type="submit" class="btn-primary">
        Log In
      </button>

    </form>

    <!-- SIGNUP FORM -->

    <form id="signupForm">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signupFullName" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" required>
      </div>

      <div class="input-group">
        <label>User Type</label>
        <select id="signupUserType">

          <option value="Citizen">
            Citizen
          </option>

          <option value="Service Provider">
            Service Provider
          </option>

        </select>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirmPassword" required>
      </div>

      <button type="submit" class="btn-primary">
        Sign Up
      </button>

    </form>

  </div>

</div>

<script>

const loginTab =
document.getElementById("loginTab");

const signupTab =
document.getElementById("signupTab");

const loginForm =
document.getElementById("loginForm");

const signupForm =
document.getElementById("signupForm");

const statusMessage =
document.getElementById("statusMessage");

function showStatus(message,type){

  statusMessage.innerText = message;
  statusMessage.className = type;
  statusMessage.style.display = "block";
}

loginTab.addEventListener("click",()=>{

  loginTab.classList.add("active");
  signupTab.classList.remove("active");

  loginForm.classList.add("active");
  signupForm.classList.remove("active");

  statusMessage.style.display="none";
});

signupTab.addEventListener("click",()=>{

  signupTab.classList.add("active");
  loginTab.classList.remove("active");

  signupForm.classList.add("active");
  loginForm.classList.remove("active");

  statusMessage.style.display="none";
});

const admin = {

  email:"admin@socio.com",
  password:"password",
  userType:"Admin",
  fullName:"Administrator"
};

signupForm.addEventListener("submit",(e)=>{

  e.preventDefault();

  const fullName =
  document.getElementById("signupFullName").value;

  const email =
  document.getElementById("signupEmail").value;

  const userType =
  document.getElementById("signupUserType").value;

  const password =
  document.getElementById("signupPassword").value;

  const confirmPassword =
  document.getElementById("signupConfirmPassword").value;

  if(password !== confirmPassword){

    return showStatus(
      "Passwords do not match!",
      "error"
    );
  }

  let users =
  JSON.parse(
    localStorage.getItem("registeredUsers")
  ) || [];

  const exists =
  users.find(user => user.email === email);

  if(exists){

    return showStatus(
      "Email already registered!",
      "error"
    );
  }

  users.push({

    fullName,
    email,
    password,
    userType,

    isVerified:
    userType === "Citizen",

    registeredOn:
    new Date().toLocaleString()
  });

  localStorage.setItem(
    "registeredUsers",
    JSON.stringify(users)
  );

  if(userType === "Citizen"){

    showStatus(
      "Citizen registration successful!",
      "success"
    );

  }else{

    showStatus(
      "Registration successful! Waiting for admin verification.",
      "success"
    );
  }

  signupForm.reset();
});

loginForm.addEventListener("submit",(e)=>{

  e.preventDefault();

  const email =
  document.getElementById("loginEmail").value;

  const password =
  document.getElementById("loginPassword").value;

  const loginUserType =
  document.getElementById("loginUserType").value;

  if(loginUserType === "Admin"){

    if(
      email === admin.email &&
      password === admin.password
    ){

      localStorage.setItem(
        "loggedInUser",
        JSON.stringify(admin)
      );

      showStatus(
        "Admin Login Successful!",
        "success"
      );

      setTimeout(()=>{

        window.location.href =
        "admin_dashboard.html";

      },1500);

      return;
    }

    return showStatus(
      "Invalid Admin Credentials!",
      "error"
    );
  }

  let users =
  JSON.parse(
    localStorage.getItem("registeredUsers")
  ) || [];

  const user =
  users.find(u =>
    u.email === email &&
    u.password === password
  );

  if(!user){

    return showStatus(
      "Invalid Credentials!",
      "error"
    );
  }

  if(user.userType !== loginUserType){

    return showStatus(
      "Wrong user type selected!",
      "error"
    );
  }

  if(!user.isVerified){

    return showStatus(
      "Waiting for admin verification.",
      "error"
    );
  }

  localStorage.setItem(
    "loggedInUser",
    JSON.stringify(user)
  );

  showStatus(
    "Login Successful!",
    "success"
  );

  if(loginUserType === "Service Provider"){

    setTimeout(()=>{

      window.location.href =
      "provider_dashboard.html";

    },1500);

  }else{

    setTimeout(()=>{

      window.location.href =
      "homeall.html";

    },1500);

  }

});

</script>

</body>
</html>
