<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Provider Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.navbar{
background:#003366;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.navbar h2{
color:white;
}

.logout{
color:white;
text-decoration:none;
font-weight:bold;
}

.section{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.section h2{
color:#003366;
margin-bottom:15px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.card p{
margin:6px 0;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
color:white;
margin-top:10px;
}

.pending{
background:#dc3545;
}

.assigned{
background:#003366;
}

.progress{
background:#ffc107;
color:black;
}

.completed{
background:#28a745;
}

select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:5px;
}

.btn{
background:#003366;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.no-data{
text-align:center;
color:#666;
}

</style>

</head>
<body>

<div class="navbar">

<h2>Service Provider Dashboard</h2>

<a href="login.html" class="logout">
Logout
</a>

</div>

<div class="section">

<h2>Assigned Community Issues</h2>

<div id="issuesContainer"></div>

</div>

<div class="section">

<h2>Assigned Service Requests</h2>

<div id="serviceContainer"></div>

</div>

<script>

function getStatusClass(status){

if(status==="Completed" || status==="Resolved")
return "completed";

if(status==="In Progress")
return "progress";

if(status==="Assigned")
return "assigned";

return "pending";
}

function updateIssue(index){

let issues =
JSON.parse(
localStorage.getItem("reportedIssues")
) || [];

const status =
document.getElementById(
`issue-status-${index}`
).value;

issues[index].status = status;

localStorage.setItem(
"reportedIssues",
JSON.stringify(issues)
);

alert("Issue Updated Successfully");

loadIssues();
}

function updateService(index){

let services =
JSON.parse(
localStorage.getItem("serviceRequests")
) || [];

const status =
document.getElementById(
`service-status-${index}`
).value;

services[index].status = status;

localStorage.setItem(
"serviceRequests",
JSON.stringify(services)
);

alert("Service Request Updated");

loadServices();
}

function loadIssues(){

const issues =
JSON.parse(
localStorage.getItem("reportedIssues")
) || [];

const container =
document.getElementById(
"issuesContainer"
);

const assignedIssues =
issues.filter(issue =>
issue.assignedTeam &&
issue.assignedTeam !== "Not Assigned"
);

if(assignedIssues.length===0){

container.innerHTML=
'<p class="no-data">No assigned issues.</p>';

return;
}

container.innerHTML=
assignedIssues.map((issue,index)=>`

<div class="card">

<p><strong>Ticket ID:</strong>
${issue.ticketId}</p>

<p><strong>Category:</strong>
${issue.category}</p>

<p><strong>Location:</strong>
${issue.location}</p>

<p><strong>Assigned Team:</strong>
${issue.assignedTeam}</p>

<div class="status ${getStatusClass(issue.status)}">
${issue.status}
</div>

<select id="issue-status-${issues.indexOf(issue)}">

<option
${issue.status==="Assigned"?"selected":""}>
Assigned
</option>

<option
${issue.status==="In Progress"?"selected":""}>
In Progress
</option>

<option
${issue.status==="Resolved"?"selected":""}>
Resolved
</option>

</select>

<button
class="btn"
onclick="updateIssue(${issues.indexOf(issue)})">

Update Status

</button>

</div>

`).join("");
}

function loadServices(){

const services =
JSON.parse(
localStorage.getItem("serviceRequests")
) || [];

const container =
document.getElementById(
"serviceContainer"
);

const assignedServices =
services.filter(service =>
service.assignedTeam
);

if(assignedServices.length===0){

container.innerHTML=
'<p class="no-data">No assigned service requests.</p>';

return;
}

container.innerHTML=
assignedServices.map((service,index)=>`

<div class="card">

<p><strong>Request ID:</strong>
${service.requestId}</p>

<p><strong>Category:</strong>
${service.category}</p>

<p><strong>Location:</strong>
${service.location}</p>

<p><strong>Assigned Team:</strong>
${service.assignedTeam}</p>

<div class="status ${getStatusClass(service.status)}">
${service.status}
</div>

<select id="service-status-${services.indexOf(service)}">

<option
${service.status==="Assigned"?"selected":""}>
Assigned
</option>

<option
${service.status==="In Progress"?"selected":""}>
In Progress
</option>

<option
${service.status==="Completed"?"selected":""}>
Completed
</option>

</select>

<button
class="btn"
onclick="updateService(${services.indexOf(service)})">

Update Status

</button>

</div>

`).join("");
}

loadIssues();
loadServices();

</script>

</body>
</html>
