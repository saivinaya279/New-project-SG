<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Requests - SocioServe</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.back-btn{
display:inline-block;
padding:10px 15px;
background:#3000cc;
color:white;
text-decoration:none;
border-radius:6px;
margin-bottom:20px;
}

h1{
text-align:center;
color:#003366;
margin-bottom:25px;
}

.section{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.section h2{
color:#003366;
margin-bottom:15px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.card p{
margin:6px 0;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
color:white;
margin-top:10px;
}

.pending{
background:#dc3545;
}

.assigned{
background:#003366;
}

.progress{
background:#ffc107;
color:black;
}

.completed{
background:#28a745;
}

.no-data{
text-align:center;
color:#666;
}

</style>
</head>

<body>

<a href="homeall.html" class="back-btn">
← Back to Home
</a>

<h1>My Requests</h1>

<div class="section">

<h2>My Reported Issues</h2>

<div id="issuesContainer"></div>

</div>

<div class="section">

<h2>My Service Requests</h2>

<div id="serviceContainer"></div>

</div>

<div class="section">

<h2>My Waste Pickup Requests</h2>

<div id="wasteContainer"></div>

</div>

<script>

function getStatusClass(status){

if(status==="Resolved" ||
status==="Completed" ||
status==="Collected")
return "completed";

if(status==="In Progress")
return "progress";

if(status==="Assigned")
return "assigned";

return "pending";
}

function loadIssues(){

const issues =
JSON.parse(
localStorage.getItem("reportedIssues")
) || [];

const container =
document.getElementById(
"issuesContainer"
);

if(issues.length===0){

container.innerHTML =
'<p class="no-data">No issues reported.</p>';

return;
}

container.innerHTML =
issues.map(issue => `

<div class="card">

<p>
<strong>Ticket ID:</strong>
${issue.ticketId}
</p>

<p>
<strong>Category:</strong>
${issue.category}
</p>

<p>
<strong>Location:</strong>
${issue.location}
</p>

<p>
<strong>Assigned Team:</strong>
${issue.assignedTeam || "Not Assigned"}
</p>

<div class="status ${getStatusClass(issue.status)}">
${issue.status}
</div>

</div>

`).join("");

}

function loadServices(){

const services =
JSON.parse(
localStorage.getItem("serviceRequests")
) || [];

const container =
document.getElementById(
"serviceContainer"
);

if(services.length===0){

container.innerHTML =
'<p class="no-data">No service requests.</p>';

return;
}

container.innerHTML =
services.map(service => `

<div class="card">

<p>
<strong>Request ID:</strong>
${service.requestId}
</p>

<p>
<strong>Category:</strong>
${service.category}
</p>

<p>
<strong>Assigned Team:</strong>
${service.assignedTeam || "Not Assigned"}
</p>

<div class="status ${getStatusClass(service.status)}">
${service.status || "Pending"}
</div>

</div>

`).join("");

}

function loadWaste(){

const waste =
JSON.parse(
localStorage.getItem("wasteRequests")
) || [];

const container =
document.getElementById(
"wasteContainer"
);

if(waste.length===0){

container.innerHTML =
'<p class="no-data">No waste requests.</p>';

return;
}

container.innerHTML =
waste.map(req => `

<div class="card">

<p>
<strong>Request ID:</strong>
${req.requestId}
</p>

<p>
<strong>Waste Type:</strong>
${req.wasteType}
</p>

<p>
<strong>Assigned Team:</strong>
${req.assignedTeam || "Not Assigned"}
</p>

<div class="status ${getStatusClass(req.status)}">
${req.status || "Pending"}
</div>

</div>

`).join("");

}

loadIssues();
loadServices();
loadWaste();

</script>

</body>
</html>
